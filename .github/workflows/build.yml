name: Build and Test

on:
  push:
  pull_request:

jobs:
  latex:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest

    steps:
      - uses: actions/checkout@v6

      - name: Build main examples
        run: |
          latexmk -xelatex -interaction=nonstopmode -halt-on-error examples/main.tex
          latexmk -xelatex -interaction=nonstopmode -halt-on-error examples/main-minimal.tex

      - name: Build test suite
        run: |
          for f in test/test-*.tex; do
            latexmk -xelatex -interaction=nonstopmode -halt-on-error "$f" || exit 1
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v6
        with:
          name: pdf-artifacts
          path: |
            build/*.pdf
